# OS1 Linux amd64 profile — real Linux kernel + rootfs on x86_64 QEMU
#
# Use with campaign-linux. The images_dir should contain:
#   bzImage     — Linux kernel
#   os1-a.img   — rootfs (symlink to rootfs.img)
#   os1-b.img   — rootfs for bank B (symlink or second copy)
#   data.img    — persistent data partition (/data)
#   swap.img    — swap partition

[vm]
bank_set = "os1"
arch = "x86_64"
ram_mb = 2048
cpus = 4
kernel = "bzImage"
# net.ifnames=0 keeps eth0 naming consistent with cvc-vm-linux.
extra_cmdline = "net.ifnames=0 vcan_shm.backend=ivshmem vcan_shm.num_devices=1"

# Disk order matters — on x86_64 (forward PCI enumeration):
#   rootfs (added by backend) → /dev/vda
#   data                      → /dev/vdb
#   swap                      → /dev/vdc
[[devices]]
type = "disk"
role = "data"
path = "data.img"

[[devices]]
type = "disk"
role = "swap"
path = "swap.img"

[[devices]]
type = "can"
index = 0
backend = "native"

[[devices]]
type = "health"
backend = "native"

[[devices]]
type = "time"
backend = "native"

[[devices]]
type = "hsm"
keystore = "/tmp/vhsm-keys"

[[devices]]
type = "network"
ssh_port = 2222
