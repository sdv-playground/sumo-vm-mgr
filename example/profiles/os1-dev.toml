# OS1 development profile — QEMU with all simulated devices
[vm]
bank_set = "os1"
ram_mb = 2048
cpus = 4
kernel = "Image"

[[devices]]
type = "can"
index = 0
backend = "simulated"

[[devices]]
type = "health"
backend = "simulated"

[[devices]]
type = "time"
backend = "simulated"

[[devices]]
type = "hsm"
keystore = "/tmp/vhsm-keys"

[[devices]]
type = "network"
ssh_port = 2222

[[devices]]
type = "disk"
role = "swap"
path = "swap.img"

[[devices]]
type = "disk"
role = "data"
path = "data.img"
