# Security Helper — ECU secrets for vm-mgr
#
# Component IDs must match the SOVD component names (hypervisor, vm1, vm2).
# The XOR algorithm with secret "ff" matches TestSecurityProvider.

[ecus.hypervisor]
algorithm = "xor"
secret = "ff"

[ecus.vm1]
algorithm = "xor"
secret = "ff"

[ecus.vm2]
algorithm = "xor"
secret = "ff"
