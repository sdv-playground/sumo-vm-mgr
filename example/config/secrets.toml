# Security Helper — ECU secrets for vm-mgr
#
# Component IDs must match the SOVD component names (hyp, os1, os2).
# The XOR algorithm with secret "ff" matches TestSecurityProvider.

[ecus.hyp]
algorithm = "xor"
secret = "ff"

[ecus.os1]
algorithm = "xor"
secret = "ff"

[ecus.os2]
algorithm = "xor"
secret = "ff"
