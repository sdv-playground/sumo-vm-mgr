# vm-mgr.yaml — declares all managed components and their backends.
#
# Each component specifies a backend:
#   dummy  — NV state only, no real VM (default)
#   qemu   — QEMU VM with optional health watchdog
#   qnx    — QNX qvm guest (future)
#
# QEMU components reference an existing VmProfile TOML for device config.

nv_store: /tmp/sumo-sovd-sim-nv.bin
images_dir: /opt/vm-mgr/images

components:
  hypervisor:
    bank_set: hypervisor
    backend: dummy

  vm1:
    bank_set: vm1
    backend: qemu
    profile: example/profiles/vm1-dev.toml
    shutdown:
      timeout_secs: 10
      method: health
    readiness:
      method: health
      timeout_secs: 30

  vm2:
    bank_set: vm2
    backend: dummy

  hsm:
    bank_set: hsm
    backend: dummy
    single_bank: true
